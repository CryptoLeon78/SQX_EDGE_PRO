<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQX Edge Pro</title>
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">SQX EDGE PRO · FASE 1A</p>
        <h1>Catálogo de activos</h1>
        <p class="subtitle">Catálogo Edge persistente · SQLite · API local</p>
      </div>
      <span id="connectionBadge" class="badge pending">Conectando…</span>
    </header>

    <section class="summary">
      <article class="metric">
        <span>Activos</span>
        <strong id="assetCount">—</strong>
      </article>
      <article class="metric">
        <span>Tipos</span>
        <strong id="typeCount">—</strong>
      </article>
      <article class="metric">
        <span>Entradas Edge</span>
        <strong id="edgeCount">—</strong>
      </article>
      <article class="metric">
        <span>API</span>
        <strong id="apiPort">—</strong>
      </article>
    </section>

    <section class="content-grid">
      <article class="panel assets-panel">
        <div class="panel-header">
          <div>
            <h2>Por activo</h2>
            <p id="tableStatus">Cargando catálogo…</p>
          </div>
          <input id="assetSearch" type="search" placeholder="Buscar activo…" />
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Símbolo</th>
                <th>Nombre</th>
                <th>Tipo</th>
                <th>Subtipo</th>
                <th>Edge</th>
              </tr>
            </thead>
            <tbody id="assetsTableBody"></tbody>
          </table>
        </div>
      </article>

      <aside class="panel detail-panel">
        <h2>Detalle</h2>
        <div id="assetDetail" class="empty-state">
          Selecciona un activo del catálogo.
        </div>
      </aside>
    </section>

    <section class="panel diagnostics">
      <div class="panel-header">
        <div>
          <h2>Diagnóstico</h2>
          <p>Respuesta del backend local</p>
        </div>
        <button id="refreshButton" type="button">Recargar catálogo</button>
      </div>
      <pre id="rawResponse"></pre>
    </section>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
