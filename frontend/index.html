<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SQX Edge Pro</title><link rel="stylesheet" href="./css/app.css"></head><body><div class="app-shell"><aside class="sidebar"><div class="brand"><span>SQX EDGE PRO</span><strong>Fase 3</strong></div><nav><button class="nav-button active" data-view="dashboard">Dashboard</button><button class="nav-button" data-view="top-picks">Top Picks</button><button class="nav-button" data-view="categories">Categorías</button><button class="nav-button" data-view="matrix">Matriz Edge</button><button class="nav-button" data-view="quality">Calidad MT5</button></nav><span id="connectionBadge" class="badge pending">Conectando…</span></aside><main class="main"><header class="topbar"><div><p class="eyebrow">SQX EDGE PRO</p><h1 id="viewTitle">Dashboard</h1><p id="viewSubtitle" class="subtitle">Visión global del catálogo y scoring Edge</p></div><button id="refreshButton">Recargar</button></header><section id="view-dashboard" class="view active"><div id="dashboardMetrics" class="summary"></div><div class="split"><article class="panel"><h2>Top Long</h2><div id="topLong"></div></article><article class="panel"><h2>Top Short</h2><div id="topShort"></div></article></div></section><section id="view-top-picks" class="view"><div class="toolbar"><button class="direction active" data-direction="L">Long</button><button class="direction" data-direction="S">Short</button><a id="exportTopPicks" class="button-link" href="#">Exportar CSV</a></div><article class="panel"><div class="table-wrap"><table><thead><tr><th>#</th><th>Activo</th><th>Tipo</th><th>Score</th><th>Cobertura</th><th>Estado</th></tr></thead><tbody id="topPicksBody"></tbody></table></div></article></section><section id="view-categories" class="view"><article class="panel"><div class="table-wrap"><table><thead><tr><th>Categoría</th><th>Indicadores</th><th>Entradas</th><th>Long</th><th>Short</th><th>Descripción</th></tr></thead><tbody id="categoriesBody"></tbody></table></div></article></section><section id="view-matrix" class="view"><div class="toolbar"><button class="matrix-direction active" data-direction="L">Long</button><button class="matrix-direction" data-direction="S">Short</button></div><article class="panel"><div class="table-wrap"><table id="matrixTable"></table></div></article></section><section id="view-quality" class="view"><article class="panel"><div class="toolbar"><button id="openImportButton">Importar CSV MT5</button><select id="qualitySnapshotSelect"><option value="">Selecciona snapshot</option></select></div><div id="qualityDetail" class="empty-state">Selecciona o importa un snapshot.</div></article></section><section class="panel diagnostics"><pre id="rawResponse"></pre></section></main></div><dialog id="importDialog" class="import-dialog"><form id="importForm"><header><h2>Importar calidad MT5</h2><button type="button" id="closeImportButton">Cerrar</button></header><label>Proveedor / broker<input id="providerInput" list="providerSuggestions" maxlength="100" required placeholder="Ej.: Darwinex"></label><datalist id="providerSuggestions"></datalist><label>CSV estadísticas<div class="file-picker"><output id="statsFileName">Sin seleccionar</output><button type="button" id="selectStatsButton">Seleccionar</button></div></label><label>CSV horario<div class="file-picker"><output id="hourlyFileName">Sin seleccionar</output><button type="button" id="selectHourlyButton">Seleccionar</button></div></label><p id="importValidation" class="form-status"></p><footer><button type="button" id="cancelImportButton">Cancelar</button><button id="submitImportButton" type="submit" disabled>Importar snapshot</button></footer></form></dialog><script type="module" src="./js/app.js"></script></body></html>
